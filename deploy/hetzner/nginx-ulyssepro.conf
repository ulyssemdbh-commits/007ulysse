server {
    listen 80;
    server_name ulyssepro.org www.ulyssepro.org;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ulyssepro.org www.ulyssepro.org;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/ulyssepro.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ulyssepro.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Disable caching for HTML to always get latest version
    location / {
        proxy_pass https://ulysseproject.org;
        proxy_set_header Host ulysseproject.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_name ulysseproject.org;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;

        # No caching for HTML pages
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets (JS, CSS, images) for performance
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass https://ulysseproject.org;
        proxy_set_header Host ulysseproject.org;
        proxy_ssl_server_name on;
        proxy_ssl_name ulysseproject.org;

        # Cache static files for 1 hour
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
