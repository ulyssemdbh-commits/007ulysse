openapi: 3.0.3
info:
  title: DevFlow - Ulysse AI Assistant API
  description: |
    API REST pour l'assistant IA Ulysse/Iris.
    
    ## Authentification
    L'API utilise des sessions basées sur des cookies HTTP-only.
    - `/api/auth/login` - Connexion
    - `/api/auth/logout` - Déconnexion
    - `/api/auth/me` - Récupérer l'utilisateur courant
    
    ## Versions
    - V1: `/api/*` - Routes legacy
    - V2: `/api/v2/*` - Architecture centralisée Ulysse Server
  version: 2.0.0
  contact:
    name: DevFlow Support

servers:
  - url: /api
    description: API v1 (Legacy)
  - url: /api/v2
    description: API v2 (Ulysse Server)

tags:
  - name: Auth
    description: Authentification et gestion de session
  - name: Chat
    description: Conversations avec Ulysse/Iris
  - name: Projects
    description: Gestion des projets
  - name: Tasks
    description: Gestion des tâches
  - name: Notes
    description: Gestion des notes
  - name: Memory
    description: Mémoire persistante de l'IA
  - name: Files
    description: Gestion des fichiers
  - name: Location
    description: Géolocalisation et itinéraires
  - name: Email
    description: Gestion des emails (AgentMail)
  - name: Homework
    description: Tâches planifiées de l'IA

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Connexion utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: maurice
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Identifiants invalides

  /auth/logout:
    post:
      tags: [Auth]
      summary: Déconnexion
      responses:
        '200':
          description: Déconnexion réussie

  /auth/me:
    get:
      tags: [Auth]
      summary: Récupérer l'utilisateur courant
      responses:
        '200':
          description: Utilisateur connecté
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Non authentifié

  /v2/conversations:
    post:
      tags: [Chat]
      summary: Envoyer un message à Ulysse
      description: |
        Endpoint streaming (SSE) pour la conversation avec l'IA.
        Retourne un flux de tokens en temps réel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: "Bonjour Ulysse, peux-tu m'aider ?"
                threadId:
                  type: string
                  description: ID de conversation existante
                originDevice:
                  type: string
                  example: "mobile_1234"
                contextHints:
                  type: object
                  properties:
                    includeMemory:
                      type: boolean
                    includeFiles:
                      type: boolean
      responses:
        '200':
          description: Stream SSE de tokens
          content:
            text/event-stream:
              schema:
                type: string

  /v2/memory:
    get:
      tags: [Memory]
      summary: Récupérer les mémoires de l'utilisateur
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [preference, fact, context, instruction]
      responses:
        '200':
          description: Liste des mémoires
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Memory'

    post:
      tags: [Memory]
      summary: Créer une nouvelle mémoire
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryInput'
      responses:
        '201':
          description: Mémoire créée

  /v2/location/sessions:
    get:
      tags: [Location]
      summary: Récupérer les sessions de géolocalisation
      responses:
        '200':
          description: Liste des sessions

    post:
      tags: [Location]
      summary: Démarrer une session de tracking
      responses:
        '201':
          description: Session créée

  /v2/location/points:
    post:
      tags: [Location]
      summary: Enregistrer un point de localisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [latitude, longitude]
              properties:
                latitude:
                  type: number
                longitude:
                  type: number
                accuracy:
                  type: number
                altitude:
                  type: number
                speed:
                  type: number
      responses:
        '201':
          description: Point enregistré

  /v2/itinerary/routes:
    get:
      tags: [Location]
      summary: Récupérer les itinéraires sauvegardés
      responses:
        '200':
          description: Liste des routes

    post:
      tags: [Location]
      summary: Créer un nouvel itinéraire
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, waypoints]
              properties:
                name:
                  type: string
                waypoints:
                  type: array
                  items:
                    type: object
                    properties:
                      lat:
                        type: number
                      lng:
                        type: number
                      label:
                        type: string
      responses:
        '201':
          description: Itinéraire créé

  /files:
    get:
      tags: [Files]
      summary: Lister les fichiers de l'utilisateur
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [generated, received, attached]
      responses:
        '200':
          description: Liste des fichiers

  /files/{id}/download:
    get:
      tags: [Files]
      summary: Télécharger un fichier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Contenu du fichier
        '404':
          description: Fichier non trouvé

  /homework:
    get:
      tags: [Homework]
      summary: Récupérer les devoirs de l'IA
      responses:
        '200':
          description: Liste des devoirs

    post:
      tags: [Homework]
      summary: Créer un nouveau devoir
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomeworkInput'
      responses:
        '201':
          description: Devoir créé

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        isOwner:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Memory:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        category:
          type: string
          enum: [preference, fact, context, instruction]
        content:
          type: string
        source:
          type: string
        importance:
          type: integer
          minimum: 1
          maximum: 5
        createdAt:
          type: string
          format: date-time

    MemoryInput:
      type: object
      required: [category, content]
      properties:
        category:
          type: string
          enum: [preference, fact, context, instruction]
        content:
          type: string
        source:
          type: string
        importance:
          type: integer
          minimum: 1
          maximum: 5

    HomeworkInput:
      type: object
      required: [title, instructions, scheduleType]
      properties:
        title:
          type: string
        instructions:
          type: string
        scheduleType:
          type: string
          enum: [once, daily, weekly, monthly]
        scheduledTime:
          type: string
          format: date-time
        priority:
          type: integer
          minimum: 1
          maximum: 5

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: connect.sid

security:
  - cookieAuth: []
