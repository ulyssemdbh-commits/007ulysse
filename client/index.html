<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f23" />
    <meta name="color-scheme" content="dark" />
    
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ulysse" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <meta name="description" content="Ulysse - Votre assistant IA personnel avec interface vocale" />
    <meta name="application-name" content="Ulysse AI" />
    
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <script>
      // Dynamic manifest for iOS PWA - must run before Safari reads manifest
      (function() {
        var path = window.location.pathname;
        var manifestLink = document.querySelector('link[rel="manifest"]');
        var themeColor = document.querySelector('meta[name="theme-color"]');
        var appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
        var appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
        
        if (path.startsWith('/courses/suguval')) {
          if (manifestLink) manifestLink.href = '/manifest-suguval.json';
          if (themeColor) themeColor.content = '#b45309';
          if (appleTitle) appleTitle.content = 'SUGUVal';
          if (appleIcon) appleIcon.href = '/suguval-icon.png';
        } else if (path.startsWith('/talking')) {
          if (manifestLink) manifestLink.href = '/manifest-talking.json';
        } else if (path.startsWith('/max')) {
          if (manifestLink) manifestLink.href = '/manifest-alfred.json';
        }
      })();
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
      html, body { 
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: contain;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
